services:
  mongo:
    image: mongo:7
    container_name: mleko-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: mleko-backend
    ports:
      - "8003:8000"
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: mleko
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./backend:/app
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: mleko-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8003/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mongo_data:
